<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DMart Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#008046",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231a",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top Bar -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between border-b border-primary/10">
<div class="text-primary flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Login</h2>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-4 py-8">
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-primary/5">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-white text-5xl">shopping_cart</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight">DMart</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Welcome back to DMart</p>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<div class="flex flex-col">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 ml-1">Mobile Number or Email</label>
<div class="relative">
<input class="form-input block w-full rounded-lg border-primary/20 bg-background-light dark:bg-background-dark dark:border-primary/30 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 h-14 px-4 text-base transition-all" placeholder="Enter your mobile or email" type="text"/>
</div>
</div>
<div class="flex flex-col">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold mb-2 ml-1">Password</label>
<div class="relative flex items-center">
<input class="form-input block w-full rounded-lg border-primary/20 bg-background-light dark:bg-background-dark dark:border-primary/30 focus:border-primary focus:ring-primary text-slate-900 dark:text-slate-100 h-14 px-4 pr-12 text-base transition-all" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-primary/60 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-3 mb-8">
<a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                    Login
                    <span class="material-symbols-outlined text-sm">login</span>
</button>
<!-- Create Account -->
<div class="text-center mt-6">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Create an Account</a>
</p>
</div>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-primary/10"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-slate-900 text-slate-400">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-primary/10 rounded-lg hover:bg-primary/5 transition-colors">
<div class="w-5 h-5 bg-center bg-no-repeat bg-contain" data-alt="Google logo icon" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAMgixnc5QzQYjt3g2DsnvH8JAFP_BaAPrJmYsMIqloA23w2CeT1tVYDp6rXXihBSXCZWoHFmRl0RnRVyuLE0yS9sDkR0LhLrKNrOGDAhT-rgSy0DxuBtZT0huE77cKqUmj3ed9MSkCSXhJhHUzUWSuTrGm7R83vYckimEPuHuoZaouYQXQLUFuFoKpCTZgHI_a8oah6XshOGpvuhR2BeZo3WKm54RinNJaofH6knLMruKDFSUd0id_23pmDvZAYjvA8A_4wdgKH-Q')"></div>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 border border-primary/10 rounded-lg hover:bg-primary/5 transition-colors">
<div class="w-5 h-5 bg-center bg-no-repeat bg-contain" data-alt="Facebook logo icon" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBg0hIQ47TALpGiuAFQ9yaQQaXyxlxzDBUTPh5NYSAJCpkGuuOMZ-NSCPmn-Adcsd0SUAtnIrELB0v3ehKrWaKfqymwkOw9tttyhuJRX9cf9EBsYzTKT8E7aocxNGk_2aJKLpUzzsqLEFRarek6jjJkCyduqxnp-TqOFtq7VKf4Vzeknl7VwF-GxYq36jhG6uBwL7T00_bcCpshPje-jwXqLJEzarWLpJVr2QN8Q5FMoqLSWGiE7OUcvQ-WRH_A5AWaa4V_qyi1nyk')"></div>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Facebook</span>
</button>
</div>
</div>
</div>
<!-- Footer Info -->
<div class="p-6 text-center">
<p class="text-slate-400 dark:text-slate-500 text-xs">
                By logging in, you agree to our <br/>
<a class="underline" href="#">Terms of Service</a> and <a class="underline" href="#">Privacy Policy</a>
</p>
</div>
</div>
</body></html>
